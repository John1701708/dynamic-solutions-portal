<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Solutions - Number Check</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 3px solid #e94560;
        }

        .header h1 {
            color: #1a1a2e;
            font-size: 2.2em;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
            font-weight: 500;
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        .search-box input {
            flex: 1;
            padding: 16px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1.1em;
            transition: all 0.3s;
            background: #fafafa;
        }

        .search-box input:focus {
            outline: none;
            border-color: #e94560;
            box-shadow: 0 0 0 4px rgba(233, 69, 96, 0.1);
        }

        .search-box button {
            padding: 16px 32px;
            background: linear-gradient(135deg, #e94560 0%, #c23a51 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .search-box button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.3);
        }

        .search-box button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            padding: 25px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
            border-left: 5px solid;
        }

        .result.show {
            display: block;
            animation: slideIn 0.4s ease;
        }

        .result.proceed {
            background: #d4edda;
            border-color: #28a745;
        }

        .result.sold {
            background: #fff3cd;
            border-color: #ffc107;
        }

        .result.dnc {
            background: #f8d7da;
            border-color: #dc3545;
        }

        .result h2 {
            margin-bottom: 15px;
            font-size: 1.4em;
            font-weight: 700;
        }

        .result.proceed h2 { color: #155724; }
        .result.sold h2 { color: #856404; }
        .result.dnc h2 { color: #721c24; }

        .result p {
            margin: 8px 0;
            color: #333;
            font-size: 1em;
        }

        .result .label {
            font-weight: 700;
            color: #555;
        }

        .btn-proceed {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 24px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            transition: all 0.3s;
        }

        .btn-proceed:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .nav-links a {
            padding: 12px 28px;
            background: #1a1a2e;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
            font-weight: 600;
        }

        .nav-links a:hover {
            background: #e94560;
            transform: translateY(-2px);
        }

        .loading {
            text-align: center;
            color: #e94560;
            font-size: 1.1em;
            display: none;
            font-weight: 600;
        }

        .loading.show {
            display: block;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
            border-left: 5px solid #dc3545;
        }

        .error.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Dynamic Solutions</h1>
            <p>Number Verification Portal</p>
        </div>

        <div class="search-box">
            <input 
                type="text" 
                id="phoneInput" 
                placeholder="Enter phone number to verify..."
                onkeypress="if(event.key==='Enter') checkNumber()"
            >
            <button id="checkBtn" onclick="checkNumber()">Check</button>
        </div>

        <div class="loading" id="loading">
            ⏳ Verifying number...
        </div>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <!-- Result will be injected here -->
        </div>

        <div class="nav-links">
            <a href="form.html">📝 Sales Entry Form</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzAL6OuJCJRqEUcXH5xKFLYFpZ2p3sD7iIDWODis6kZWnoLWtwJPPRMFiTzdUzmJYM/exec';

        async function checkNumber() {
            const phoneInput = document.getElementById('phoneInput');
            const phone = phoneInput.value.trim();
            const resultDiv = document.getElementById('result');
            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const checkBtn = document.getElementById('checkBtn');

            resultDiv.classList.remove('show', 'proceed', 'sold', 'dnc');
            errorDiv.classList.remove('show');
            
            if (!phone) {
                errorDiv.textContent = '❌ Please enter a phone number!';
                errorDiv.classList.add('show');
                return;
            }

            loadingDiv.classList.add('show');
            checkBtn.disabled = true;

            try {
                const response = await fetch(`${API_URL}?action=check&phone=${encodeURIComponent(phone)}`);
                const data = await response.json();

                loadingDiv.classList.remove('show');
                checkBtn.disabled = false;

                let html = '';
                
                if (data.status === 'PROCEED') {
                    resultDiv.classList.add('proceed');
                    html = `
                        <h2>✅ ${data.message}</h2>
                        <p>This number is new and ready for sale!</p>
                        <a href="form.html?phone=${encodeURIComponent(phone)}" class="btn-proceed">
                            📝 Fill Sales Form
                        </a>
                    `;
                } 
                else if (data.status === 'ALREADY_SOLD') {
                    resultDiv.classList.add('sold');
                    const d = data.data;
                    html = `
                        <h2>⚠️ ${data.message}</h2>
                        <p><span class="label">Name on Bill:</span> ${d.nameOnBill || 'N/A'}</p>
                        <p><span class="label">Person on Call:</span> ${d.personOnCall || 'N/A'}</p>
                        <p><span class="label">Phone:</span> ${d.referenceNumber || 'N/A'}</p>
                        <p><span class="label">Product:</span> ${d.product || 'N/A'}</p>
                        <p><span class="label">Agent:</span> ${d.agentName || 'N/A'} (${d.agentId || 'N/A'})</p>
                        <p><span class="label">Status:</span> ${d.status || 'N/A'}</p>
                        <p><span class="label">Date:</span> ${d.date || 'N/A'}</p>
                    `;
                } 
                else if (data.status === 'DNC') {
                    resultDiv.classList.add('dnc');
                    const d = data.data;
                    html = `
                        <h2>🚫 ${data.message}</h2>
                        <p><span class="label">Phone Number:</span> ${d.phoneNumber || 'N/A'}</p>
                        <p><span class="label">Reason:</span> ${d.reason || 'N/A'}</p>
                        <p><span class="label">Date Added:</span> ${d.dateAdded || 'N/A'}</p>
                    `;
                }

                resultDiv.innerHTML = html;
                resultDiv.classList.add('show');

            } catch (err) {
                loadingDiv.classList.remove('show');
                checkBtn.disabled = false;
                errorDiv.textContent = '❌ Network Error: ' + err.message;
                errorDiv.classList.add('show');
            }
        }
    </script>
</body>
</html>
