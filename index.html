<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Solutions - Number Check</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 5px;
        }

        .logo p {
            color: #888;
            font-size: 1.1em;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .search-box input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1.1em;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-box button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .search-box button:hover {
            transform: translateY(-2px);
        }

        .search-box button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result.proceed {
            background: #d4edda;
            border: 2px solid #28a745;
        }

        .result.sold {
            background: #fff3cd;
            border: 2px solid #ffc107;
        }

        .result.dnc {
            background: #f8d7da;
            border: 2px solid #dc3545;
        }

        .result h2 {
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .result.proceed h2 { color: #155724; }
        .result.sold h2 { color: #856404; }
        .result.dnc h2 { color: #721c24; }

        .result p {
            margin: 8px 0;
            color: #333;
            font-size: 1.05em;
        }

        .result .label {
            font-weight: bold;
            color: #555;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }

        .nav-links a {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: background 0.3s;
        }

        .nav-links a:hover {
            background: #764ba2;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 1.2em;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }

        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🔍 Dynamic Solutions</h1>
            <p>Number Check Portal</p>
        </div>

        <div class="search-box">
            <input 
                type="text" 
                id="phoneInput" 
                placeholder="Enter phone number to check..."
                onkeypress="if(event.key==='Enter') checkNumber()"
            >
            <button id="checkBtn" onclick="checkNumber()">Check</button>
        </div>

        <div class="loading" id="loading">
            ⏳ Checking number...
        </div>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <!-- Result will be injected here -->
        </div>

        <div class="nav-links">
            <a href="form.html">📝 Go to Sales Form</a>
        </div>
    </div>

    <script>
        // ⚠️ IMPORTANT: Yahan apna Google Apps Script URL daalna!
        const API_URL = 'https://script.google.com/macros/s/AKfycbwHC6sKxL8MtRYgKgTWIylAOmIvzJMlHsUapNfFniGrrk5A6qsKCofmuYxgqmDMwQ/exec';

        async function checkNumber() {
            const phoneInput = document.getElementById('phoneInput');
            const phone = phoneInput.value.trim();
            const resultDiv = document.getElementById('result');
            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const checkBtn = document.getElementById('checkBtn');

            // Reset
            resultDiv.classList.remove('show', 'proceed', 'sold', 'dnc');
            errorDiv.classList.remove('show');
            
            if (!phone) {
                errorDiv.textContent = '❌ Please enter a phone number!';
                errorDiv.classList.add('show');
                return;
            }

            // Show loading
            loadingDiv.classList.add('show');
            checkBtn.disabled = true;

            try {
                const response = await fetch(`${API_URL}?action=check&phone=${encodeURIComponent(phone)}`);
                const data = await response.json();

                loadingDiv.classList.remove('show');
                checkBtn.disabled = false;

                if (data.error) {
                    errorDiv.textContent = `❌ Error: ${data.error}`;
                    errorDiv.classList.add('show');
                    return;
                }

                // Show result based on status
                let html = '';
                
                if (data.status === 'PROCEED') {
                    resultDiv.classList.add('proceed');
                    html = `
                        <h2>✅ ${data.message}</h2>
                        <p>This number is new and ready for sale!</p>
                        <p style="margin-top:15px;">
                            <a href="form.html?phone=${encodeURIComponent(phone)}" 
                               style="display:inline-block;padding:10px 20px;background:#28a745;color:white;text-decoration:none;border-radius:8px;">
                                📝 Fill Sales Form
                            </a>
                        </p>
                    `;
                } 
                else if (data.status === 'ALREADY_SOLD') {
                    resultDiv.classList.add('sold');
                    const d = data.data;
                    html = `
                        <h2>⚠️ ${data.message}</h2>
                        <p><span class="label">Name on Bill:</span> ${d.nameOnBill || 'N/A'}</p>
                        <p><span class="label">Person on Call:</span> ${d.personOnCall || 'N/A'}</p>
                        <p><span class="label">Product:</span> ${d.product || 'N/A'}</p>
                        <p><span class="label">Agent ID:</span> ${d.agentId || 'N/A'}</p>
                        <p><span class="label">Reference Number:</span> ${d.referenceNumber || 'N/A'}</p>
                        <p><span class="label">Agent Name:</span> ${d.agentName || 'N/A'}</p>
                        <p><span class="label">CONF:</span> ${d.conf || 'N/A'}</p>
                        <p><span class="label">Status:</span> ${d.status || 'N/A'}</p>
                        <p><span class="label">Date:</span> ${d.date || 'N/A'}</p>
                        <p><span class="label">Timestamp:</span> ${d.timestamp || 'N/A'}</p>
                    `;
                } 
                else if (data.status === 'DNC') {
                    resultDiv.classList.add('dnc');
                    const d = data.data;
                    html = `
                        <h2>🚫 ${data.message}</h2>
                        <p><span class="label">Phone Number:</span> ${d.phoneNumber || 'N/A'}</p>
                        <p><span class="label">Reason:</span> ${d.reason || 'N/A'}</p>
                        <p><span class="label">Date Added:</span> ${d.dateAdded || 'N/A'}</p>
                    `;
                }

                resultDiv.innerHTML = html;
                resultDiv.classList.add('show');

            } catch (err) {
                loadingDiv.classList.remove('show');
                checkBtn.disabled = false;
                errorDiv.textContent = `❌ Network Error: ${err.message}`;
                errorDiv.classList.add('show');
            }
        }
    </script>
</body>
</html>
