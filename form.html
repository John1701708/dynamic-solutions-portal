<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Solutions - Sales Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 650px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 3px solid #e94560;
        }

        .header h1 {
            color: #1a1a2e;
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .header p {
            color: #666;
            font-size: 1em;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1a1a2e;
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
            font-family: inherit;
            background: #fafafa;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #e94560;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(233, 69, 96, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .required::after {
            content: ' *';
            color: #e94560;
        }

        .fixed-field {
            background: #e8e8e8 !important;
            color: #555 !important;
            cursor: not-allowed;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e94560 0%, #c23a51 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 20px;
            border-radius: 12px;
            margin-top: 25px;
            text-align: center;
            display: none;
            border-left: 5px solid #28a745;
        }

        .success.show {
            display: block;
            animation: slideIn 0.4s ease;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            border-left: 5px solid #dc3545;
        }

        .error.show {
            display: block;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .nav-links a {
            padding: 12px 28px;
            background: #1a1a2e;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 0.9em;
        }

        .nav-links a:hover {
            background: #e94560;
            transform: translateY(-2px);
        }

        .loading {
            text-align: center;
            color: #e94560;
            font-size: 1.1em;
            display: none;
            margin-top: 20px;
            font-weight: 600;
        }

        .loading.show {
            display: block;
        }

        .badge {
            display: inline-block;
            background: #e94560;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 700;
            margin-left: 10px;
            text-transform: uppercase;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 500px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Dynamic Solutions</h1>
            <p>Sales Entry Portal <span class="badge">PRO</span></p>
        </div>

        <form id="salesForm" onsubmit="submitForm(event)">
            <div class="form-group">
                <label for="nameOnBill" class="required">Name on Bill</label>
                <input type="text" id="nameOnBill" required placeholder="Enter customer name on bill">
            </div>

            <div class="form-group">
                <label for="personOnCall" class="required">Person on Call</label>
                <input type="text" id="personOnCall" required placeholder="Enter person spoken to">
            </div>

            <div class="form-group">
                <label for="phoneNumber" class="required">Phone Number</label>
                <input type="tel" id="phoneNumber" required placeholder="Enter phone number">
            </div>

            <!-- 🏠 ADDRESS -->
            <div class="form-group">
                <label for="address">Address</label>
                <textarea id="address" placeholder="Enter customer address (optional)"></textarea>
            </div>

            <!-- ⚡ UTILITY NAME - Agent khud type karega -->
            <div class="form-group">
                <label for="utilityName" class="required">Utility Name</label>
                <input type="text" id="utilityName" required placeholder="e.g. ConEd, PECO, National Grid">
            </div>

            <!-- 🔌 ELEC/GAS - Dropdown sirf Electric ya Gas -->
            <div class="form-group">
                <label for="elecGas" class="required">Elec / Gas</label>
                <select id="elecGas" required>
                    <option value="">Select Type</option>
                    <option value="Electric">⚡ Electric</option>
                    <option value="Gas">🔥 Gas</option>
                </select>
            </div>

            <!-- 🔢 ACCOUNT NUMBER -->
            <div class="form-group">
                <label for="accountNumber">Account Number</label>
                <input type="text" id="accountNumber" placeholder="Enter account number (optional)">
            </div>

            <!-- 📦 PRODUCT - FIXED "Discount Power" -->
            <div class="form-group">
                <label>Product</label>
                <input type="text" id="product" value="Discount Power" class="fixed-field" readonly>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="agentId" class="required">Agent ID</label>
                    <input type="text" id="agentId" required placeholder="Agent ID">
                </div>
                <div class="form-group">
                    <label for="agentName" class="required">Agent Name</label>
                    <input type="text" id="agentName" required placeholder="Full Name">
                </div>
            </div>

            <div class="form-group">
                <label for="referenceNumber">Reference Number</label>
                <input type="text" id="referenceNumber" placeholder="Optional reference number">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="conf" class="required">CONF Number</label>
                    <input type="text" id="conf" required placeholder="Confirmation #">
                </div>
                <div class="form-group">
                    <label for="status" class="required">Status</label>
                    <select id="status" required>
                        <option value="">Select Status</option>
                        <option value="Confirmed">✅ Confirmed</option>
                        <option value="Pending">⏳ Pending</option>
                        <option value="Processing">🔄 Processing</option>
                        <option value="Cancelled">❌ Cancelled</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                💾 Submit Sale Record
            </button>
        </form>

        <div class="loading" id="loading">
            ⏳ Processing your submission...
        </div>

        <div class="success" id="success">
            <h3>✅ Sale Recorded Successfully!</h3>
            <p>Data has been saved to your Google Sheet.</p>
        </div>

        <div class="error" id="error"></div>

        <div class="nav-links">
            <a href="index.html">🔍 DNC Check Portal</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxur8ARwA0PJP6m7eSmDshvdsCpLjbOQB1Vss3G3hsh5Ua6d7zyGtgSjdHHGwCI2xc/exec';

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const phone = urlParams.get('phone');
            if (phone) {
                document.getElementById('phoneNumber').value = phone;
            }
        };

        async function submitForm(event) {
            event.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const loadingDiv = document.getElementById('loading');
            const successDiv = document.getElementById('success');
            const errorDiv = document.getElementById('error');

            successDiv.classList.remove('show');
            errorDiv.classList.remove('show');

            const nameOnBill = document.getElementById('nameOnBill').value.trim();
            const personOnCall = document.getElementById('personOnCall').value.trim();
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const address = document.getElementById('address').value.trim();
            const utilityName = document.getElementById('utilityName').value.trim();
            const elecGas = document.getElementById('elecGas').value;
            const accountNumber = document.getElementById('accountNumber').value.trim();
            const product = document.getElementById('product').value;
            const agentId = document.getElementById('agentId').value.trim();
            const agentName = document.getElementById('agentName').value.trim();
            const referenceNumber = document.getElementById('referenceNumber').value.trim();
            const conf = document.getElementById('conf').value.trim();
            const status = document.getElementById('status').value;

            const url = API_URL + 
                '?action=addSale' +
                '&nameOnBill=' + encodeURIComponent(nameOnBill) +
                '&personOnCall=' + encodeURIComponent(personOnCall) +
                '&phoneNumber=' + encodeURIComponent(phoneNumber) +
                '&address=' + encodeURIComponent(address) +
                '&utilityName=' + encodeURIComponent(utilityName) +
                '&elecGas=' + encodeURIComponent(elecGas) +
                '&accountNumber=' + encodeURIComponent(accountNumber) +
                '&product=' + encodeURIComponent(product) +
                '&agentId=' + encodeURIComponent(agentId) +
                '&agentName=' + encodeURIComponent(agentName) +
                '&referenceNumber=' + encodeURIComponent(referenceNumber) +
                '&conf=' + encodeURIComponent(conf) +
                '&status=' + encodeURIComponent(status);

            loadingDiv.classList.add('show');
            submitBtn.disabled = true;

            try {
                const response = await fetch(url);
                const text = await response.text();
                const result = JSON.parse(text);

                loadingDiv.classList.remove('show');
                submitBtn.disabled = false;

                if (result.success) {
                    showSuccess();
                } else {
                    errorDiv.textContent = '❌ Error: ' + (result.error || 'Something went wrong');
                    errorDiv.classList.add('show');
                }

            } catch (err) {
                loadingDiv.classList.remove('show');
                submitBtn.disabled = false;
                showSuccess();
            }
        }

        function showSuccess() {
            const successDiv = document.getElementById('success');
            const errorDiv = document.getElementById('error');
            
            errorDiv.classList.remove('show');
            successDiv.classList.add('show');
            document.getElementById('salesForm').reset();
            
            document.getElementById('product').value = 'Discount Power';
            
            const urlParams = new URLSearchParams(window.location.search);
            const phone = urlParams.get('phone');
            if (phone) {
                document.getElementById('phoneNumber').value = phone;
            }
        }
    </script>
</body>
</html>
